# ============================================================
# Backup & Monitor Configuration File
# Edit this file to customize your setup
# ============================================================

# ── Backup Sources ───────────────────────────────────────────
# Comma-separated list of directories to back up
BACKUP_SOURCES="/home/sherif/Documents,/etc"

# ── Backup Destination ───────────────────────────────────────
# Where backups are stored (daily/weekly/monthly subdirs created automatically)
BACKUP_DEST="/var/backups/auto_backup"

# ── Backup Retention ─────────────────────────────────────────
KEEP_DAILY=7        # Number of daily backups to keep
KEEP_WEEKLY=4       # Number of weekly backups to keep
KEEP_MONTHLY=6      # Number of monthly backups to keep

# ── Disk Usage Monitoring ────────────────────────────────────
# Alert when disk usage exceeds this percentage (0-100)
DISK_THRESHOLD=80

# ── Log Management ───────────────────────────────────────────
# Max log file size in KB before rotation triggers
LOG_MAX_SIZE_KB=1024   # 1 MB

# Number of days to keep archived log files
LOG_KEEP_DAYS=30

# ── Email Notifications ──────────────────────────────────────
# Set to "true" to enable email alerts, "false" to disable
EMAIL_ENABLED=false

# Email recipient for all notifications
EMAIL_RECIPIENT="admin@example.com"

# SMTP server settings (used with mailx / s-nail)
SMTP_SERVER="smtp.example.com"
SMTP_PORT=587
SMTP_USER="your_email@example.com"
SMTP_PASS="your_password"
